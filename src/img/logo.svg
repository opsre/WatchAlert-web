<svg width="160" height="36" viewBox="0 0 160 36" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgb(255, 203, 125);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgb(167, 135, 83);stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Watch text -->
  <text x="5" y="26" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
